# ============================================================
# Стили и тема
# ============================================================
extra_css:
  - stylesheets/custom.css

theme:
  name: material
  language: ru
  
  # Шрифты (Inter + JetBrains Mono — современнее)
  font:
    text: Inter
    code: JetBrains Mono
  
  # Логотип
  logo: images/favicon.png
  
  # Фавикон
  favicon: images/favicon.png
  
  # 3-позиционный переключатель тем (ПРАВИЛЬНАЯ СТРУКТУРА!)
  palette:
    # 1. Автоматическая тема (по умолчанию)
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Переключить на светлую тему

    # 2. Светлая тема (ОБЯЗАТЕЛЬНО с media!)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Переключить на темную тему

    # 3. Тёмная тема (ОБЯЗАТЕЛЬНО с media!)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Переключить на системную тему
  
  # Функции Material
  features:
    - content.action.edit
    - content.action.view
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.prune
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

# ============================================================
# Плагины
# ============================================================
plugins:
  - search
  - awesome-pages

# ============================================================
# Расширения Markdown
# ============================================================
markdown_extensions:
  - toc:
      permalink: true
      permalink_title: Ссылка на раздел
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

# ============================================================
# Дополнительные настройки
# ============================================================
extra:
  generator: true  # Показывать "Made with Material for MkDocs"
  

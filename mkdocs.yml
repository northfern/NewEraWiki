# ============================================================
# Основная информация
# ============================================================
site_name: Большая Энциклопедия NewEra и Эррландии
site_description: "Лор, персонажи и история мира NewEra и Эррландии"
site_author: "NorthFern"
site_url: https://northfern.github.io/NewEraWiki/
repo_url: https://github.com/northfern/NewEraWiki
edit_uri: edit/main/docs/
view_uri: raw/main/docs/

# Копирайт
copyright: >
  <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">
    <img src="https://i.creativecommons.org/l/by-sa/4.0/80x15.png" alt="CC BY-SA 4.0" style="vertical-align: middle; margin-right: 4px;">
    CC BY-SA 4.0
  </a>
  · 2026 Большая Энциклопедия NewEra и Эррландии

# ============================================================
# Стили и тема
# ============================================================
extra_css:
  - stylesheets/custom.css

theme:
  name: material
  language: ru
  
  # Шрифты
  font:
    text: Inter
    code: JetBrains Mono
  
  # Логотип
  logo: images/favicon.png
  
  # Фавикон
  favicon: images/favicon.png
  
  palette:
    # 1. Автоматическая тема
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Переключить на светлую тему

    # 2. Светлая тема
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Переключить на темную тему

    # 3. Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Переключить на системную тему
  
  # Функции Material
  features:
    - content.action.edit
    - content.action.view
    - navigation.sections
    - navigation.indexes
    - navigation.prune
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

# ============================================================
# Плагины
# ============================================================
plugins:
  - search
  - awesome-pages
  - git-revision-date-localized:
      type: date          # Формат даты
      locale: ru          # Русский язык
      fallback_to_build_date: true  # Если Git недоступен

# ============================================================
# Расширения Markdown
# ============================================================
markdown_extensions:
  - toc:
      permalink: true
      permalink_title: Ссылка на раздел
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

# ============================================================
# Дополнительные настройки
# ============================================================
extra:
  generator: true  # Показывать "Made with Material for MkDocs"
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/pvYxRYx5Sy
      name: Discord
